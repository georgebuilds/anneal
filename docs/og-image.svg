<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g1" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#F2C57C" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#14110F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="78%" cy="80%" r="38%">
      <stop offset="0%"   stop-color="#FF7A45" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#14110F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="22%" cy="22%" r="35%">
      <stop offset="0%"   stop-color="#00ADD8" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#14110F" stop-opacity="0"/>
    </radialGradient>
    <mask id="ember-og">
      <path d="M 370,272 C 370,210 325,210 300,210"
            stroke="white" stroke-width="28" fill="none" stroke-linecap="round"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#14110F"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <rect width="1200" height="630" fill="url(#g3)"/>

  <!--
    Mark — centered around x=300, y=210 (gold node)
    ViewBox paths scaled 2.5×: original viewbox 200×150 → 500×375
    Teal arc:  M 15,15 C 15,75 60,75 100,75  scaled to M 37.5,37.5 C 37.5,187.5 150,187.5 250,187.5
    But let's just use absolute coords for the OG image mark at a natural size.

    Mark gold node at (300, 210). Arcs at 1.5× scale from original.
    Original: teal from (15,15) to (100,75). Scale 1.5: (22,22) to (150,112). Offset to gold node (300,210):
      teal start = (300 - 150 + 22, 210 - 112 + 22) = (172, 120)
      ember start = mirror = (300 + 150 - 22, 210 + 112 - 22) = (428, 300)
    Control points for teal: C (172, 210) (240, 210) (300, 210)
    Control points for ember: C (428, 210) (360, 210) (300, 210)
  -->

  <!-- Teal forward arc -->
  <path d="M 172,120 C 172,210 240,210 300,210"
        stroke="#00ADD8" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Ember backward arc (dashed, revealed via mask) -->
  <path d="M 428,300 C 428,210 360,210 300,210"
        stroke="#FF7A45" stroke-width="4" fill="none"
        stroke-dasharray="10 6" stroke-linecap="round"
        mask="url(#ember-og)"/>

  <!-- Input dots -->
  <circle cx="172" cy="120" r="6" fill="#00ADD8" opacity="0.7"/>
  <circle cx="428" cy="300" r="6" fill="#FF7A45" opacity="0.7"/>

  <!-- Gold fusion node -->
  <circle cx="300" cy="210" r="10" fill="#F2C57C"/>

  <!-- Wordmark -->
  <text x="490" y="240"
        font-family="'Courier New', Courier, monospace"
        font-size="128" font-weight="bold"
        fill="#E8E2DA" letter-spacing="-5">anneal</text>

  <!-- Tagline -->
  <text x="492" y="298"
        font-family="'Courier New', Courier, monospace"
        font-size="28" font-weight="normal"
        fill="#F2C57C" letter-spacing="-0.5">Autodiff is a compiler pass.</text>

  <!-- Sub-tagline -->
  <text x="492" y="337"
        font-family="'Courier New', Courier, monospace"
        font-size="20" fill="#8A817A">a Go tensor compiler</text>

  <!-- Divider line (teal → gold → ember gradient approximated with two rects) -->
  <line x1="490" y1="545" x2="1130" y2="545" stroke="#5C544D" stroke-width="1"/>

  <!-- Footer attribution -->
  <text x="490" y="580"
        font-family="'Courier New', Courier, monospace"
        font-size="18" fill="#5C544D">georgebuilds / anneal · v0.1 · agpl-3.0</text>

  <!-- Border frame (subtle) -->
  <rect x="1" y="1" width="1198" height="628"
        fill="none" stroke="#1F1A17" stroke-width="2" rx="2"/>
</svg>
